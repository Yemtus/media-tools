name: media_tools
description: A powerful media processing app powered by FFmpeg.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffmpeg_kit_flutter_new: ^4.1.0
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true