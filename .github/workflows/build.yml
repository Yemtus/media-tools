name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: media-tools-arm64
          path: build/app/outputs/apk/release/app-release-arm64-v8a-release.apk

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: media-tools-arm32
          path: build/app/outputs/apk/release/app-release-armeabi-v7a-release.apk